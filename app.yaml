name: evzone-backend
region: nyc
services:
  - name: api
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 3000
    instance_count: 2
    instance_size_slug: basic-xxs
    autoscaling:
      min_instance_count: 2
      max_instance_count: 8
      metrics:
        cpu:
          percent: 70
    run_command: node dist/apps/api/apps/api/src/main.js
    routes:
      - path: /
    health_check:
      http_path: /health/ready
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    liveness_health_check:
      http_path: /health/live
      initial_delay_seconds: 10
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: APP_NAME
        scope: BUILD_TIME
        value: api
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${REDIS_URL}
      - key: KAFKA_BROKERS
        scope: RUN_TIME
        value: ${KAFKA_BROKERS}
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: ${FRONTEND_URL}
      - key: API_KAFKA_REQUIRED_ON_STARTUP
        scope: RUN_TIME
        value: 'false'
      - key: API_READINESS_REQUIRE_KAFKA
        scope: RUN_TIME
        value: 'false'
      - key: API_READINESS_REQUIRE_REDIS
        scope: RUN_TIME
        value: 'false'

  - name: worker
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 3010
    instance_count: 2
    instance_size_slug: basic-xxs
    autoscaling:
      min_instance_count: 2
      max_instance_count: 10
      metrics:
        cpu:
          percent: 65
    run_command: node dist/apps/worker/apps/worker/src/main.js
    health_check:
      http_path: /health/ready
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    liveness_health_check:
      http_path: /health/live
      initial_delay_seconds: 10
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: APP_NAME
        scope: BUILD_TIME
        value: worker
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${REDIS_URL}
      - key: KAFKA_BROKERS
        scope: RUN_TIME
        value: ${KAFKA_BROKERS}
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: WORKER_PORT
        scope: RUN_TIME
        value: '3010'
      - key: WORKER_READY_MAX_CONSUMER_LAG
        scope: RUN_TIME
        value: '1000'
      - key: OUTBOX_CIRCUIT_BREAKER_ENABLED
        scope: RUN_TIME
        value: 'true'
      - key: OUTBOX_CIRCUIT_OPEN_MS
        scope: RUN_TIME
        value: '15000'
      - key: OUTBOX_CIRCUIT_FAILURE_THRESHOLD
        scope: RUN_TIME
        value: '5'
      - key: COMMAND_HISTORY_CLEANUP_ENABLED
        scope: RUN_TIME
        value: 'true'
      - key: COMMAND_HISTORY_CLEANUP_INTERVAL_MS
        scope: RUN_TIME
        value: '3600000'
      - key: COMMAND_HISTORY_RETENTION_DAYS
        scope: RUN_TIME
        value: '30'
      - key: COMMAND_HISTORY_CLEANUP_BATCH_SIZE
        scope: RUN_TIME
        value: '1000'
      - key: WORKER_AUDIT_ENABLED
        scope: RUN_TIME
        value: 'true'

jobs:
  - name: db-migrate
    kind: PRE_DEPLOY
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: npx prisma@5.22.0 migrate deploy
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${DATABASE_URL}

domains:
  - domain: api.evzonecharging.com
    type: PRIMARY
