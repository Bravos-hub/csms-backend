name: Deploy EVZone Backend To Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-evzone-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy On Droplet
    runs-on: ubuntu-latest
    env:
      DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
      DROPLET_USER: ${{ secrets.DROPLET_USER }}
      DROPLET_PASSWORD: ${{ secrets.DROPLET_PASSWORD }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$DROPLET_HOST" ]; then
            echo "Missing required secret: DROPLET_HOST"
            exit 1
          fi
          if [ -z "$DROPLET_USER" ]; then
            echo "Missing required secret: DROPLET_USER"
            exit 1
          fi
          if [ -z "$DROPLET_PASSWORD" ]; then
            echo "Missing required secret: DROPLET_PASSWORD"
            exit 1
          fi

      - name: Deploy backend on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          port: ${{ secrets.DROPLET_SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.DROPLET_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="$HOME/csms-backend"
            fi
            cd "$DEPLOY_DIR"
            if [ -n "$(git status --porcelain)" ]; then
              STASH_NAME="ci-autostash-$(date -u +%Y%m%dT%H%M%SZ)"
              git stash push --include-untracked -m "$STASH_NAME"
            fi
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            chmod +x ./scripts/deploy-compose.sh
            ./scripts/deploy-compose.sh
