name: Deploy EVZone Backend To Droplet

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-evzone-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy On Droplet
    runs-on: ubuntu-latest
    env:
      DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
      DROPLET_USER: ${{ secrets.DROPLET_USER }}
      DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
      API_PUBLIC_DOMAIN: ${{ secrets.API_PUBLIC_DOMAIN }}
      PORTAL_ORIGIN: ${{ secrets.PORTAL_ORIGIN }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$DROPLET_HOST" ]; then
            echo "Missing required secret: DROPLET_HOST"
            exit 1
          fi
          if [ -z "$DROPLET_USER" ]; then
            echo "Missing required secret: DROPLET_USER"
            exit 1
          fi
          if [ -z "$DROPLET_SSH_KEY" ]; then
            echo "Missing required secret: DROPLET_SSH_KEY"
            exit 1
          fi

      - name: Deploy backend on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || '22' }}
          envs: API_PUBLIC_DOMAIN,PORTAL_ORIGIN
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.DROPLET_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="$HOME/csms-backend"
            fi
            if [ "${DEPLOY_DIR#~/}" != "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="$HOME/${DEPLOY_DIR#~/}"
            fi

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "Deploy directory does not contain a git repository: $DEPLOY_DIR"
              exit 1
            fi

            cd "$DEPLOY_DIR"

            if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
              STASH_NAME="ci-autostash-$(date -u +%Y%m%dT%H%M%SZ)"
              git stash push -m "$STASH_NAME"
            fi

            git fetch origin main
            if git rev-parse --verify main >/dev/null 2>&1; then
              git checkout main
            else
              git checkout -b main origin/main
            fi
            git reset --hard origin/main
            git clean -fd -e .env -e certbot/ -e certs/

            chmod +x ./scripts/deploy-compose.sh
            ./scripts/deploy-compose.sh

            HEALTH_URL="http://127.0.0.1:3000/health"
            MAX_ATTEMPTS=24
            SLEEP_SECONDS=5
            ATTEMPT=1
            HEALTHY=0
            while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
              RESPONSE="$(curl -sS --max-time 10 -w '\n%{http_code}' "$HEALTH_URL" || true)"
              HTTP_CODE="$(printf '%s\n' "$RESPONSE" | tail -n1)"
              BODY="$(printf '%s\n' "$RESPONSE" | sed '$d')"

              if [ "$HTTP_CODE" = "200" ] && printf '%s' "$BODY" | grep -q '"status":"ok"'; then
                HEALTHY=1
                echo "Post-deploy /health check passed on attempt $ATTEMPT."
                echo "$BODY"
                break
              fi

              echo "Health attempt $ATTEMPT/$MAX_ATTEMPTS failed (http=$HTTP_CODE)."
              if [ -n "$BODY" ]; then
                echo "$BODY"
              fi
              ATTEMPT=$((ATTEMPT + 1))
              sleep "$SLEEP_SECONDS"
            done

            if [ "$HEALTHY" -ne 1 ]; then
              echo "Post-deploy /health check failed after $MAX_ATTEMPTS attempts."
              docker compose ps || true
              docker compose logs --tail=200 api || true
              docker compose logs --tail=200 worker || true
              exit 1
            fi

            API_CID="$(docker compose ps -q api || true)"
            WORKER_CID="$(docker compose ps -q worker || true)"
            API_STATUS="$(docker inspect -f '{{.State.Status}}' "$API_CID" 2>/dev/null || true)"
            WORKER_STATUS="$(docker inspect -f '{{.State.Status}}' "$WORKER_CID" 2>/dev/null || true)"
            if [ "$API_STATUS" != "running" ] || [ "$WORKER_STATUS" != "running" ]; then
              echo "Post-deploy container state check failed (api=$API_STATUS worker=$WORKER_STATUS)."
              docker compose ps || true
              docker compose logs --tail=200 api || true
              docker compose logs --tail=200 worker || true
              exit 1
            fi

            PUBLIC_DOMAIN="${API_PUBLIC_DOMAIN:-api.evzonecharging.com}"
            PUBLIC_ORIGIN="${PORTAL_ORIGIN:-https://portal.evzonecharging.com}"

            HTTPS_READY=0
            HTTPS_ATTEMPT=1
            MAX_HTTPS_ATTEMPTS=12
            while [ "$HTTPS_ATTEMPT" -le "$MAX_HTTPS_ATTEMPTS" ]; do
              if curl -kfsS --resolve "$PUBLIC_DOMAIN:443:127.0.0.1" "https://$PUBLIC_DOMAIN/health/ready" >/dev/null; then
                HTTPS_READY=1
                echo "Public HTTPS health check passed on attempt $HTTPS_ATTEMPT."
                break
              fi
              echo "Public HTTPS health check $HTTPS_ATTEMPT/$MAX_HTTPS_ATTEMPTS failed."
              HTTPS_ATTEMPT=$((HTTPS_ATTEMPT + 1))
              sleep 5
            done

            if [ "$HTTPS_READY" -ne 1 ]; then
              echo "Public HTTPS endpoint did not become ready for $PUBLIC_DOMAIN. Attempting nginx restart..."
              if command -v systemctl >/dev/null 2>&1; then
                systemctl restart nginx || true
                sleep 5
                if curl -kfsS --resolve "$PUBLIC_DOMAIN:443:127.0.0.1" "https://$PUBLIC_DOMAIN/health/ready" >/dev/null; then
                  HTTPS_READY=1
                  echo "Public HTTPS health check passed after nginx restart."
                else
                  systemctl status nginx --no-pager || true
                fi
              fi
            fi

            if [ "$HTTPS_READY" -ne 1 ]; then
              echo "Public HTTPS endpoint is still not ready for $PUBLIC_DOMAIN."
              exit 1
            fi

            PREFLIGHT_RESPONSE="$(curl -kfsS -i -X OPTIONS \
              --resolve "$PUBLIC_DOMAIN:443:127.0.0.1" \
              "https://$PUBLIC_DOMAIN/api/v1/auth/login" \
              -H "Origin: $PUBLIC_ORIGIN" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: content-type" || true)"

            PREFLIGHT_HEADERS="$(printf '%s' "$PREFLIGHT_RESPONSE" | tr -d '\r')"
            if ! printf '%s' "$PREFLIGHT_HEADERS" | grep -Fqi "Access-Control-Allow-Origin: $PUBLIC_ORIGIN"; then
              echo "CORS preflight failed for origin $PUBLIC_ORIGIN on $PUBLIC_DOMAIN."
              echo "Preflight response:"
              printf '%s\n' "$PREFLIGHT_RESPONSE"
              exit 1
            fi
