global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: evzone-api
    metrics_path: /health/metrics/prometheus
    static_configs:
      - targets:
          - host.docker.internal:3000
        labels:
          service: api
          env: local

  - job_name: evzone-worker
    metrics_path: /metrics/prometheus
    static_configs:
      - targets:
          - host.docker.internal:3010
        labels:
          service: worker
          env: local
