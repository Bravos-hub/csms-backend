  api-token: "CHANGEME_API_TOKEN_STAGING"  # Generate via: openssl rand -base64 32

---
# EMQX API Credentials Secret (Production)
apiVersion: v1
kind: Secret
metadata:
  name: emqx-api-credentials
  namespace: mqtt-production
type: Opaque
stringData:
  api-token: "CHANGEME_API_TOKEN_PRODUCTION"  # Generate via: openssl rand -base64 32

---
# TLS Certificate Secret (Staging - self-signed)
apiVersion: v1
kind: Secret
metadata:
  name: emqx-tls
  namespace: mqtt-staging
type: kubernetes.io/tls
data:
  # These are base64-encoded self-signed certificates (examples)
  # Generate with: openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365
  # Then base64 encode and paste here
  tls.crt: 

```

**Note**: You must generate valid TLS certificates and replace the data field with base64-encoded certificate and key. See README.md for generation instructions.

---

# TLS Certificate Secret (Production - use cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: emqx-tls
  namespace: mqtt-production
spec:
  secretName: emqx-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "mqtt.evzone.production"
    - "mqtt-api.evzone.production"
    - "emqx.mqtt-production.svc.cluster.local"
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days

---
# Elasticsearch Credentials Secret (Logging)
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-credentials
  namespace: mqtt-production
type: Opaque
stringData:
  username: "elastic"
  password: "CHANGEME_ELASTICSEARCH"  # Must be securely generated
