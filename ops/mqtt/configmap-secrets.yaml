---
# Redis Credentials Secret (Production)
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: mqtt-production
type: Opaque
stringData:
  host: "redis.default"
  port: "6379"
  password: ""  # If using password protection, update here

---
# MySQL Credentials Secret (Production)
