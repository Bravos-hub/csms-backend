---
# EMQX Configuration ConfigMap (Staging)
apiVersion: v1
kind: ConfigMap
metadata:
  name: emqx-config
  namespace: mqtt-staging
  labels:
    app: emqx
    environment: staging
data:
  emqx.conf: |
    ## EMQX Core Configuration (Staging Environment)
    
    ## Node and Cluster Configuration
    node.name = emqx@$(HOSTNAME).emqx.mqtt-staging.svc.cluster.local
    node.cookie = emqx_cookie
    
    ## Cluster Discovery (Kubernetes)
    cluster.discovery = k8s
    cluster.k8s.apiserver = https://kubernetes.default.svc.cluster.local:443
    cluster.k8s.address_type = hostname
    cluster.k8s.label_selector = "app=emqx,environment=staging"
    cluster.k8s.namespace = mqtt-staging
    cluster.autoclean = 5m
    
    ## MQTT Listeners
    # TCP Listener (1883)
    listeners.tcp.default = 0.0.0.0:1883
    listeners.tcp.default.max_connections = 100000
    listeners.tcp.default.rate_limit = "100MB,10s"
    listeners.tcp.default.backlog = 1024
    listeners.tcp.default.send_timeout = 15s
    listeners.tcp.default.send_timeout_close = on
    listeners.tcp.default.proxy_protocol = off
    listeners.tcp.default.proxy_protocol_timeout = 3s
    
    # TLS Listener (8883) - requires certificates
    listeners.ssl.default = 0.0.0.0:8883
    listeners.ssl.default.keyfile = /opt/emqx/etc/certs/key.pem
    listeners.ssl.default.certfile = /opt/emqx/etc/certs/cert.pem
    listeners.ssl.default.max_connections = 100000
    listeners.ssl.default.rate_limit = "100MB,10s"
    
    # WebSocket Listener (8083)
    listeners.ws.default = 0.0.0.0:8083
    listeners.ws.default.max_connections = 50000
    
    # Secure WebSocket Listener (8084)
    listeners.wss.default = 0.0.0.0:8084
    listeners.wss.default.keyfile = /opt/emqx/etc/certs/key.pem
    listeners.wss.default.certfile = /opt/emqx/etc/certs/cert.pem
    listeners.wss.default.max_connections = 50000
    
    ## Authentication
    authentication.built_in_database {
      user_id_type = username
      password_hash_type = sha256
      password_hash_field = password_hash
    }
    
    # Default users (CHANGE IN PRODUCTION)
    users.admin = "public"  # MUST be changed before deploying
    users.guest = "public"  # MUST be changed before deploying
    
    ## Authorization (ACL)
    authorization {
      deny_action = disconnect
      cache {
        enable = true
        ttl = 1h
        max_size = 32MB
      }
    }
    
    ## MQTT Configuration
    mqtt.idle_timeout = 15s
    mqtt.max_packet_size = 1MB
    mqtt.max_subscribing_column = 10
    mqtt.upgrade_qos = false
    mqtt.max_inflight = 32
    mqtt.retain {
      enabled = true
      max_retained_messages = 0  # Unlimited
      msg_expiry_interval = 0    # Never expire
    }
    
    ## Message Delivery
    delivery {
      max_inflight = 32
      max_awaiting_rel = 100
    }
    
    ## Session Configuration
    session.max_subscriptions = 10000
    session.upgrade_qos = false
    session.max_inflight = 32
    session.max_awaiting_rel = 100
    
    ## Persistence Configuration
    # Message Persistence (Redis backend)
    backend.redis.enable = on
    backend.redis.database = 0
    backend.redis.password = ""
    backend.redis.server = "redis.default:6379"
    backend.redis.pool_size = 8
    backend.redis.auto_reconnect = true
    backend.redis.max_retries = 3
    backend.redis.retry_interval = 5s
    
    ## Dashboard and API
    dashboard {
      listeners.http.default = 0.0.0.0:18083
      listeners.http.default.acceptors = 8
    }
    
    management {
      listeners.http.default = 0.0.0.0:8081
      listeners.http.default.acceptors = 8
    }
    
    ## Monitoring
    statsd.enable = false
    
    # Prometheus metrics
    prometheus.enable = true
    prometheus.push_gateway.enable = false
    prometheus.interval = 15s
    
    ## Logging
    log.console = true
    log.console.level = info
    log.console.formatter = json
    log.console.time_offset = system
    
    log.file.enable = true
    log.file.level = info
    log.file.dir = /opt/emqx/log
    log.file.path = /opt/emqx/log/emqx.log
    
    ## Performance Tuning
    broker {
      route_batch_clean = 100
      enable_stats = on
    }
    
    ## Connection and Rate Limiting
    ratelimit {
      client = "10000/(1s)"
      internal = "100000/(1s)"
    }

---
# EMQX Configuration ConfigMap (Production)
apiVersion: v1
kind: ConfigMap
metadata:
  name: emqx-config
  namespace: mqtt-production
  labels:
    app: emqx
    environment: production
data:
  emqx.conf: |
    ## EMQX Core Configuration (Production Environment)
    
    ## Node and Cluster Configuration
    node.name = emqx@$(HOSTNAME).emqx.mqtt-production.svc.cluster.local
    node.cookie = emqx_cookie_prod
    node.process_limit = 2097152
    node.max_ports = 1048576
    
    ## Cluster Discovery (Kubernetes)
    cluster.discovery = k8s
    cluster.k8s.apiserver = https://kubernetes.default.svc.cluster.local:443
    cluster.k8s.address_type = hostname
    cluster.k8s.label_selector = "app=emqx,environment=production"
    cluster.k8s.namespace = mqtt-production
    cluster.autoclean = 5m
    cluster.autoheal = true
    cluster.partition_mode = prefer_local
    
    ## MQTT Listeners
    # TCP Listener (1883)
    listeners.tcp.default = 0.0.0.0:1883
    listeners.tcp.default.max_connections = 250000
    listeners.tcp.default.acceptors = 16
    listeners.tcp.default.rate_limit = "1GB,10s"
    listeners.tcp.default.backlog = 2048
    listeners.tcp.default.send_timeout = 15s
    listeners.tcp.default.send_timeout_close = on
    listeners.tcp.default.tcp_send_buf = 64KB
    listeners.tcp.default.tcp_recv_buf = 64KB
    
    # TLS Listener (8883)
    listeners.ssl.default = 0.0.0.0:8883
    listeners.ssl.default.keyfile = /opt/emqx/etc/certs/key.pem
    listeners.ssl.default.certfile = /opt/emqx/etc/certs/cert.pem
    listeners.ssl.default.max_connections = 200000
    listeners.ssl.default.acceptors = 16
    listeners.ssl.default.rate_limit = "1GB,10s"
    
    # WebSocket Listener (8083)
    listeners.ws.default = 0.0.0.0:8083
    listeners.ws.default.max_connections = 100000
    listeners.ws.default.acceptors = 8
    
    # Secure WebSocket Listener (8084)
    listeners.wss.default = 0.0.0.0:8084
    listeners.wss.default.keyfile = /opt/emqx/etc/certs/key.pem
    listeners.wss.default.certfile = /opt/emqx/etc/certs/cert.pem
    listeners.wss.default.max_connections = 100000
    listeners.wss.default.acceptors = 8
    
    ## Authentication (Production)
    authentication.built_in_database {
      user_id_type = username
      password_hash_type = sha256
      password_hash_field = password_hash
    }
    
    # Production users (MUST be configured from secrets)
    # Do not include defaults in production
    
    ## Authorization (ACL)
    authorization {
      type = built_in_database
      enable = true
      deny_action = disconnect
      cache {
        enable = true
        ttl = 1h
        max_size = 64MB
      }
    }
    
    ## MQTT Configuration (Production)
    mqtt.idle_timeout = 15s
    mqtt.max_packet_size = 10MB
    mqtt.max_subscribing_column = 10
    mqtt.upgrade_qos = false
    mqtt.max_inflight = 32
    mqtt.retain {
      enabled = true
      max_retained_messages = 0  # Unlimited
      msg_expiry_interval = 0    # Never expire
    }
    
    ## Message Delivery (Production)
    delivery {
      max_inflight = 32
      max_awaiting_rel = 100
      queue_mode = volatile
    }
    
    ## Session Configuration (Production)
    session.max_subscriptions = 10000
    session.upgrade_qos = false
    session.max_inflight = 32
    session.max_awaiting_rel = 100
    session.persistence = on  # Store to MySQL
    
    ## Persistence Configuration (Production)
    # Message Persistence (Redis backend with replication)
    backend.redis.enable = on
    backend.redis.database = 0
    backend.redis.password = ""
    backend.redis.server = "redis.default:6379"
    backend.redis.pool_size = 16
    backend.redis.auto_reconnect = true
    backend.redis.max_retries = 3
    backend.redis.retry_interval = 5s
    backend.redis.ssl = true
    backend.redis.ssl_verify = verify_peer
    
    # Session Persistence (MySQL backend)
    backend.mysql.enable = on
    backend.mysql.server = "mysql.default:3306"
    backend.mysql.username = "emqx"
    backend.mysql.password = ""
    backend.mysql.database = "emqx"
    backend.mysql.pool_size = 16
    backend.mysql.auto_reconnect = true
    backend.mysql.query_timeout = 30s
    
    ## Dashboard and API (Production)
    dashboard {
      listeners.http.default = 0.0.0.0:18083
      listeners.http.default.acceptors = 8
      listeners.https.default = 0.0.0.0:18084
      listeners.https.default.keyfile = /opt/emqx/etc/certs/key.pem
      listeners.https.default.certfile = /opt/emqx/etc/certs/cert.pem
    }
    
    management {
      listeners.http.default = 0.0.0.0:8081
      listeners.http.default.acceptors = 8
      listeners.https.default = 0.0.0.0:8084
      listeners.https.default.keyfile = /opt/emqx/etc/certs/key.pem
      listeners.https.default.certfile = /opt/emqx/etc/certs/cert.pem
    }
    
    ## Monitoring
    statsd.enable = true
    statsd.server = "localhost:8125"
    statsd.sample_time_interval = 10s
    
    # Prometheus metrics
    prometheus.enable = true
    prometheus.push_gateway.enable = true
    prometheus.push_gateway.server = "http://prometheus-pushgateway.monitoring:9091"
    prometheus.interval = 10s  # More frequent in production
    
    ## Logging (Production)
    log.console = true
    log.console.level = warning  # Less verbose in production
    log.console.formatter = json
    log.console.time_offset = system
    
    log.file.enable = true
    log.file.level = info
    log.file.dir = /opt/emqx/log
    log.file.path = /opt/emqx/log/emqx.log
    log.file.rotation.size = 100MB
    log.file.rotation.count = 5
    
    # Audit logging
    log.audit = true
    log.audit.level = info
    log.audit.formatter = json
    
    ## Performance Tuning (Production)
    broker {
      route_batch_clean = 100
      enable_stats = on
      stats_lifetime = 15m
    }
    
    # Connection pool settings
    connection_pool {
      pool_size = 16
      max_idle_time = 5m
    }
    
    ## Connection and Rate Limiting (Production)
    ratelimit {
      client = "10000/(1s)"
      internal = "500000/(1s)"
      connection = "1000/s"
    }
    
    ## FlowControl
    flow_control {
      enable = true
      watermark = "2MB,10s"
    }

---
# Kubernetes Secret for EMQX Admin Credentials (Staging)
apiVersion: v1
kind: Secret
metadata:
  name: emqx-admin
  namespace: mqtt-staging
type: Opaque
stringData:
  username: "admin"
  password: "CHANGEME_STAGING"  # Must be changed before deployment

---
# Kubernetes Secret for EMQX Admin Credentials (Production)
apiVersion: v1
kind: Secret
metadata:
  name: emqx-admin
  namespace: mqtt-production
type: Opaque
stringData:
  username: "admin"
  password: "CHANGEME_PRODUCTION"  # Must be securely generated and changed

---
